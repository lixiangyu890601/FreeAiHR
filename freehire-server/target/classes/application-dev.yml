# 开发环境配置
spring:
  # 数据源配置
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://47.100.73.57:5432/freehire
    username: postgres
    password: postgres
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  # Redis配置
  data:
    redis:
      host: 47.100.73.57
      port: 6379
      password: FreeHR@Redis2024!Secure
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-wait: -1
          max-idle: 8
          min-idle: 0

  # 邮件配置
  mail:
    host: smtp.example.com
    port: 465
    username: your-email@example.com
    password: your-password
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory

# 文件存储配置
file:
  storage-type: local  # 可选: local, oss, minio
  local:
    base-path: ./uploads  # 开发环境使用项目目录下的 uploads 文件夹
    url-prefix: /api/files  # 需要包含 context-path 前缀
    allowed-types: pdf,doc,docx,jpg,jpeg,png,gif,xlsx,xls
    max-file-size: 50
  # 阿里云OSS配置（预留）
  oss:
    endpoint: oss-cn-shanghai.aliyuncs.com
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    bucket-name: freehire
  # MinIO配置（预留）
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket-name: freehire

# AI服务配置说明
# AI配置已改为从数据库管理，请在「系统管理 → AI配置」页面进行配置
# 支持的服务商：OpenAI、Kimi、DeepSeek、通义千问、豆包、智谱AI、百川、MiniMax、Ollama(本地)

# 日志级别
logging:
  level:
    com.freehire: DEBUG
    org.springframework.web: DEBUG

