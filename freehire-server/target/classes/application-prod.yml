# 生产环境配置
spring:
  # 数据源配置
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:freehire}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-wait: -1
          max-idle: 8
          min-idle: 0

  # 邮件配置（按需配置）
  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

# 文件存储配置
file:
  storage-type: ${FILE_STORAGE_TYPE:local}
  local:
    base-path: /data/freehire/uploads
    url-prefix: /api/files
    allowed-types: pdf,doc,docx,jpg,jpeg,png,gif,xlsx,xls
    max-file-size: 50
  oss:
    endpoint: ${OSS_ENDPOINT:}
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    bucket-name: ${OSS_BUCKET:freehire}

# AI服务配置说明
# AI配置从数据库管理，请在「系统管理 → AI配置」页面进行配置

# 日志级别
logging:
  level:
    com.freehire: INFO
    org.springframework.web: WARN
  file:
    name: /var/log/freehire/app.log
    max-size: 100MB
    max-history: 30
